# ImageNet-1K Classification with DALI GPU-fused pipeline
seed: 42

# Dataset configuration
dataset:
  name: "imagenet"
  data_dir: "/path/to/imagenet"         # ImageFolder layout with train/ and val/
  num_classes: 1000
  image_size: 224                        # DALI decode/crop size
  final_image_size: 224                  # After optional resize
  patch_size: 16                         # 224/16 = 14x14 = 196 patches
  eval_crop_ratio: 0.875                 # Standard ImageNet eval crop ratio
  local_staging_dir: null                # Set to NVMe path for SLURM staging

# DALI pipeline settings
dali:
  num_workers: 8
  prefetch_factor: 2
  seed: 42

# Augmentation (DALI-fused)
augmentation:
  use_three_augment: true
  color_jitter: 0.3
  rand_augment: "rand-m9-mstd0.5-inc1"  # Set to null or "" to disable
  random_erasing_prob: 0.25
  random_erasing_mode: "pixel"

# Mixup/CutMix
mixup:
  mixup_alpha: 0.8
  cutmix_alpha: 1.0
  prob: 1.0
  switch_prob: 0.5
  mode: "batch"
  label_smoothing: 0.1

# Model architecture
model:
  name: "platoformer"
  hidden_dim: 384
  num_layers: 12
  num_heads: 8
  solid_name: "cyclic_4"
  spatial_dim: 2
  dense_mode: true

  # Task configuration
  scalar_task_level: "graph"
  vector_task_level: "graph"
  ffn_readout: false

  # Attention settings
  mean_aggregation: false
  attention: true
  dropout: 0.0
  drop_path_rate: 0.1
  layer_scale_init_value: null
  ffn_dim_factor: 4
  norm_type: "layernorm"           # "layernorm" (apex fused) or "rmsnorm" (quack fused on H100+)

  # Positional encoding (RoPE and APE)
  rope_sigma: 16.0
  ape_sigma: 16.0
  learned_freqs: true
  freq_init: "spiral"
  use_key: false

# Training configuration
training:
  epochs: 300
  batch_size: 256
  loss_fn: "bce"
  gradient_clip_val: 1.0
  train_augm: false                      # Rotation augmentation on point cloud

# Optimizer configuration
optimizer:
  name: "adamw"
  lr: 1.0e-3
  weight_decay: 0.05

# Scheduler configuration
scheduler:
  name: "cosine"
  warmup_epochs: 20

# Logging configuration
logging:
  enabled: true
  project_name: "Platonic-ImageNet"

# System configuration
system:
  gpus: 1
  num_workers: 8
  enable_progress_bar: true
  precision: "bf16-mixed"  # Options: "16-mixed", "bf16-mixed", "32"

# Testing configuration
testing:
  test_ckpt: null
  resume_ckpt: null

# Checkpoint configuration
checkpoint:
  monitor: "valid_acc_top1"
  mode: "max"
  save_last: true
